syntax = "proto3";

package Data;

service DataService {
  rpc GetDataStream (DataRequest) returns (stream DataChunk);
}

message DataRequest {}

message DataChunk {
  string message = 1;   // siempre "grpc ok"
  int64 timestamp = 2;  // Unix timestamp en ms
  string data = 3;      // 1 KB de datos por chunk
}